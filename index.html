<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revive Hub - Coming Soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            -webkit-text-size-adjust: 100%;
        }

        :root {
            --font-en: 'Poppins', sans-serif;
            --font-ne: 'Mukta', 'Noto Sans Devanagari', 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-en);
            font-size: 17px;
            line-height: 1.6;
            background: linear-gradient(135deg, #0f1b2e 0%, #1a2940 50%, #1a2f3f 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        html[lang="ne"] body {
            font-family: var(--font-ne);
            font-size: 18px;
            line-height: 1.7;
        }

        /* Animated background particles */
        .background-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: rgba(255, 122, 44, 0.08);
            border-radius: 50%;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0.1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .container {
            text-align: center;
            background: rgba(20, 35, 55, 0.95);
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 60px rgba(255, 122, 44, 0.05);
            max-width: 600px;
            width: 90%;
            z-index: 10;
            position: relative;
            animation: slideUp 0.8s ease-out;
            border: 1px solid rgba(255, 122, 44, 0.15);
            margin: 24px 0;
        }

        .language-switcher {
            position: absolute;
            top: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(8, 18, 32, 0.6);
            border: 1px solid rgba(255, 122, 44, 0.25);
            border-radius: 999px;
            padding: 4px;
            z-index: 20;
        }

        .lang-btn {
            border: none;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            cursor: pointer;
            color: #cfd7e4;
            background: transparent;
            font-family: 'Poppins', sans-serif;
            transition: all 0.25s ease;
        }

        .lang-btn.active,
        .lang-btn:hover {
            color: #ffffff;
            background: linear-gradient(135deg, #ff7a2c, #ff9451);
            box-shadow: 0 4px 12px rgba(255, 122, 44, 0.4);
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .logo-container {
            margin-bottom: 30px;
            animation: scaleIn 0.8s ease-out 0.2s both;
            position: relative;
        }

        .logo-container::before {
            content: '';
            position: absolute;
            width: 130px;
            height: 130px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 122, 44, 0.15) 0%, rgba(100, 180, 255, 0.08) 100%);
            border-radius: 50%;
            animation: glowPulse 3s ease-in-out infinite;
            z-index: -1;
        }

        .logo-container img {
            max-width: 100px;
            height: auto;
            border-radius: 50%;
            border: 3px solid rgba(255, 122, 44, 0.25);
            padding: 8px;
            background: rgba(30, 50, 80, 0.5);
            filter: drop-shadow(0 6px 12px rgba(255, 122, 44, 0.25)) drop-shadow(0 2px 4px rgba(100, 180, 255, 0.15));
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(255, 122, 44, 0.3), 0 0 40px rgba(100, 180, 255, 0.15);
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                box-shadow: 0 0 40px rgba(255, 122, 44, 0.4), 0 0 60px rgba(100, 180, 255, 0.2);
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(2deg);
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .company-name {
            font-size: clamp(2.1rem, 5vw, 2.8rem);
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            animation: fadeInDown 0.8s ease-out 0.3s both;
            letter-spacing: 1px;
            text-shadow: 0 2px 20px rgba(255, 122, 44, 0.2);
        }

        html[lang="ne"] .company-name {
            letter-spacing: 0;
        }

        @keyframes fadeInDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .status-text {
            font-size: clamp(1.15rem, 2.6vw, 1.4rem);
            color: #e0e0e0;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .status-text span {
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-text::after {
            display: none;
        }

        @keyframes blink {
            0%, 100% {
                opacity: 1;
                box-shadow: 0 0 8px rgba(255, 122, 44, 0.8);
            }
            50% {
                opacity: 0.3;
                box-shadow: 0 0 0px rgba(255, 122, 44, 0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .progress-container {
            margin: 50px 0;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 1rem;
            color: #b0b0b0;
        }

        .progress-percentage {
            font-weight: 600;
            font-size: 1.1em;
            color: #ff7a2c;
        }

        .progress-bar-bg {
            background: rgba(100, 120, 150, 0.3);
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.4), inset 0 0 15px rgba(255, 122, 44, 0.15);
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff7a2c 0%, #ff9451 100%);
            border-radius: 10px;
            width: 0%;
            animation: fillProgress 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            box-shadow: 0 0 20px rgba(255, 122, 44, 0.8), 0 0 30px rgba(255, 148, 81, 0.5), inset 0 1px 3px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes fillProgress {
            0% {
                width: 0%;
            }
            100% {
                width: 30%;
            }
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .message-text {
            color: #a0a0a0;
            font-size: 1rem;
            margin-top: 20px;
            line-height: 1.75;
            animation: fadeInUp 0.8s ease-out 0.6s both;
        }

        .message-text strong {
            color: #ff7a2c;
            font-weight: 600;
        }

        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            animation: fadeInUp 0.8s ease-out 0.7s both;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 122, 44, 0.15);
            border: 2px solid rgba(255, 122, 44, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff7a2c;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 122, 44, 0.1);
            animation: scaleInSocial 0.6s ease-out backwards;
            touch-action: manipulation;
        }

        .call-us-btn {
            background: linear-gradient(135deg, #ff7a2c, #ff9451);
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: scaleInSocial 0.6s ease-out 0.7s backwards;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 20px rgba(255, 122, 44, 0.3);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .call-us-btn::before {
            content: '';
            position: absolute;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: right 0.5s ease;
        }

        .call-us-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 16px 35px rgba(255, 122, 44, 0.5);
        }

        .call-us-btn:hover::before {
            right: 100%;
        }

        .call-us-btn i {
            font-size: 18px;
            transform: rotate(90deg);
        }

        .whatsapp-btn {
            background: rgba(37, 211, 102, 0.15);
            border: 2px solid rgba(37, 211, 102, 0.4);
            padding: 10px 20px;
            border-radius: 50px;
            color: #25d366;
            font-size: 1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: scaleInSocial 0.6s ease-out 0.8s backwards;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
        }

        .whatsapp-btn:hover {
            background: rgba(37, 211, 102, 0.3);
            border-color: #25d366;
            box-shadow: 0 12px 28px rgba(37, 211, 102, 0.4);
            color: #ffffff;
            transform: translateY(-3px);
        }

        .social-link:nth-child(1) { animation-delay: 0.7s; }
        .social-link:nth-child(2) { animation-delay: 0.8s; }
        .social-link:nth-child(3) { animation-delay: 0.9s; }

        @keyframes scaleInSocial {
            from {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .social-link:hover {
            transform: translateY(-8px) scale(1.15);
            box-shadow: 0 12px 25px rgba(255, 122, 44, 0.4);
            background: rgba(255, 122, 44, 0.3);
            border-color: #ff7a2c;
            color: #ffffff;
        }

        .social-link i {
            font-size: 24px;
            transition: all 0.3s ease;
        }

        /* Individual social link styles */
        .facebook-link {
            background: rgba(255, 122, 44, 0.15);
            border-color: rgba(255, 122, 44, 0.4);
            color: #ff7a2c;
        }

        .facebook-link:hover {
            background: rgba(255, 122, 44, 0.3);
            border-color: #ff7a2c;
            box-shadow: 0 12px 28px rgba(255, 122, 44, 0.4);
            color: #ffffff;
        }

        .whatsapp-link {
            background: rgba(37, 211, 102, 0.15);
            border-color: rgba(37, 211, 102, 0.4);
            color: #25d366;
        }

        .whatsapp-link:hover {
            background: rgba(37, 211, 102, 0.3);
            border-color: #25d366;
            box-shadow: 0 12px 28px rgba(37, 211, 102, 0.4);
            color: #ffffff;
        }

        .phone-link {
            background: rgba(100, 180, 255, 0.15);
            border-color: rgba(100, 180, 255, 0.4);
            color: #64b4ff;
        }

        .phone-link:hover {
            background: rgba(100, 180, 255, 0.3);
            border-color: #64b4ff;
            box-shadow: 0 12px 28px rgba(100, 180, 255, 0.4);
            color: #ffffff;
        }

        .email-link {
            background: rgba(255, 122, 44, 0.15);
            border-color: rgba(255, 122, 44, 0.4);
            color: #ff7a2c;
        }

        .email-link:hover {
            background: rgba(255, 122, 44, 0.3);
            border-color: #ff7a2c;
            box-shadow: 0 12px 28px rgba(255, 122, 44, 0.4);
            color: #ffffff;
        }

        .icon-only {
            width: 50px;
            height: 50px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 122, 44, 0.3);
            border-radius: 50%;
            border-top-color: #ff7a2c;
            animation: spin 1s ease-in-out infinite;
            vertical-align: middle;
            margin-left: 10px;
        }

        .location-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 2px solid rgba(255, 122, 44, 0.2);
            animation: fadeInUp 0.8s ease-out 0.8s both;
        }

        .location-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.9em;
            color: #b0b0b0;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .location-header i {
            color: #ff7a2c;
            font-size: 1.1em;
        }

        .location-item {
            margin: 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            animation: slideLeft 0.8s ease-out backwards;
        }

        .location-item:nth-child(1) { animation-delay: 0.9s; }
        .location-item:nth-child(2) { animation-delay: 1s; }

        .location-item i {
            color: #64b4ff;
            font-size: 1.2em;
            width: 24px;
            text-align: center;
        }

        .location-item span {
            font-size: 1rem;
            color: #e0e0e0;
            font-weight: 500;
        }

        @keyframes slideLeft {
            from {
                transform: translateX(20px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Page load animations */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: pageLoadShine 1.5s ease-out forwards;
            z-index: 999;
            pointer-events: none;
        }

        @keyframes pageLoadShine {
            0% {
                left: -100%;
            }
            100% {
                left: 100%;
            }
        }

        /* Popup Styles */
        .popup {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 35, 55, 0.95);
            border: 2px solid rgba(255, 122, 44, 0.4);
            border-radius: 15px;
            padding: 25px;
            max-width: 300px;
            z-index: 1000;
            display: none;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 0 30px rgba(255, 122, 44, 0.08);
            animation: popupSlideIn 0.5s ease-out;
            max-width: min(320px, calc(100vw - 20px));
        }

        .popup.show {
            display: block;
        }

        .popup-close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ff7a2c;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .popup-close:hover {
            transform: rotate(90deg);
            color: #ff9451;
        }

        .popup-content {
            text-align: center;
            position: relative;
        }

        .popup-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(255, 122, 44, 0.2), rgba(255, 148, 81, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 30px;
            color: #ff7a2c;
            border: 2px solid rgba(255, 122, 44, 0.3);
            animation: iconPulse 2s ease-in-out infinite;
        }

        .popup-icon.whatsapp-icon {
            color: #25d366;
            border-color: rgba(37, 211, 102, 0.3);
            background: linear-gradient(135deg, rgba(37, 211, 102, 0.15), rgba(37, 211, 102, 0.08));
        }

        .popup-content h3 {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .popup-content p {
            color: #e0e0e0;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .popup-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .call-popup-btn {
            background: linear-gradient(135deg, #ff7a2c, #ff9451);
            color: white;
            box-shadow: 0 5px 15px rgba(255, 122, 44, 0.3);
        }

        .call-popup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 122, 44, 0.5);
        }

        .whatsapp-popup-btn {
            background: linear-gradient(135deg, #25d366, #20ba5a);
            color: white;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .whatsapp-popup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
        }

        @keyframes popupSlideIn {
            from {
                transform: translateX(400px) translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
        }

        @keyframes iconPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
                justify-content: center;
                align-items: center;
            }

            .container {
                padding: 40px 20px;
                border-radius: 15px;
                max-width: 100%;
                margin: 0 auto;
            }

            .language-switcher {
                top: 10px;
                right: 10px;
            }

            .lang-btn {
                padding: 6px 9px;
                font-size: 11px;
            }

            .logo-container {
                margin-bottom: 20px;
            }

            .logo-container img {
                width: 90px;
                height: 90px;
            }

            .logo-container::before {
                width: 100px;
                height: 100px;
            }

            .company-name {
                font-size: 30px;
                margin-bottom: 12px;
            }

            .status-text {
                font-size: 20px;
            }

            .progress-container {
                margin: 30px 0;
            }

            .progress-label {
                font-size: 0.85em;
                flex-direction: column;
                gap: 8px;
                align-items: flex-start;
            }

            .progress-percentage {
                font-size: 1em;
                align-self: flex-start;
            }

            .message-text {
                font-size: 0.95rem;
                margin-top: 15px;
            }

            .social-links {
                margin-top: 30px;
                gap: 12px;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                align-items: center;
            }

            .call-us-btn {
                padding: 12px 24px;
                font-size: 1rem;
                width: 100%;
                max-width: 360px;
                justify-content: center;
                order: 1;
            }

            .call-us-btn i {
                font-size: 16px;
            }

            .whatsapp-btn {
                padding: 12px 24px;
                font-size: 1rem;
                width: 100%;
                max-width: 360px;
                justify-content: center;
                order: 2;
            }

            .whatsapp-btn i {
                font-size: 16px;
            }

            .social-link {
                width: 48px;
                height: 48px;
                font-size: 18px;
            }

            .facebook-link {
                order: 3;
            }

            .email-link {
                order: 4;
            }

            .location-section {
                margin-top: 30px;
            }

            .location-header {
                font-size: 0.85em;
                letter-spacing: 1px;
            }

            .location-header i {
                font-size: 1em;
            }

            .location-item {
                margin: 10px 0;
                font-size: 0.9em;
                gap: 8px;
            }

            .location-item i {
                font-size: 1.1em;
            }

            .location-item span {
                font-size: 0.95rem;
            }

            .popup {
                bottom: max(10px, env(safe-area-inset-bottom));
                right: max(10px, env(safe-area-inset-right));
                left: max(10px, env(safe-area-inset-left));
                max-width: none;
                padding: 20px;
                border-radius: 12px;
            }

            .popup-icon {
                width: 50px;
                height: 50px;
                font-size: 24px;
            }

            .popup-content h3 {
                font-size: 16px;
            }

            .popup-content p {
                font-size: 13px;
            }

            .popup-btn {
                font-size: 13px;
                padding: 10px 16px;
                width: 100%;
                justify-content: center;
            }

            .particle {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 15px;
            }

            .company-name {
                font-size: 26px;
            }

            .status-text {
                font-size: 18px;
            }

            .progress-label {
                font-size: 0.8em;
            }

            .progress-percentage {
                font-size: 0.95em;
            }

            .social-link {
                width: 44px;
                height: 44px;
                font-size: 16px;
            }

            .call-us-btn i,
            .whatsapp-btn i {
                font-size: 14px;
            }

            .message-text {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 360px) {
            .container {
                padding: 25px 12px;
            }

            .logo-container img {
                width: 70px;
                height: 70px;
            }

            .company-name {
                font-size: 22px;
                margin-bottom: 8px;
            }

            .status-text {
                font-size: 16px;
            }

            .progress-label span:first-child {
                display: none;
            }

            .call-us-btn,
            .whatsapp-btn {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            .call-us-btn i {
                font-size: 14px;
            }

            .popup {
                bottom: max(8px, env(safe-area-inset-bottom));
                right: max(8px, env(safe-area-inset-right));
                left: max(8px, env(safe-area-inset-left));
                padding: 15px;
            }

            .popup-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>
<body>
    <div class="background-animation" id="backgroundAnimation"></div>

    <div class="container">
        <div class="language-switcher" aria-label="Language switcher">
            <button class="lang-btn active" id="langEn" type="button">EN</button>
            <button class="lang-btn" id="langNe" type="button">ने</button>
        </div>

        <div class="logo-container">
            <img src="img/logo.png" alt="Revive Hub Logo">
        </div>

        <h1 class="company-name" id="companyName">Revive Hub</h1>

        <p class="status-text" id="statusText">
            🔧 Under Development
        </p>

        <div class="progress-container">
            <div class="progress-label">
                <span id="progressLabelText">Development Progress</span>
                <span class="progress-percentage" id="progressText">30%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill"></div>
            </div>
            <p class="message-text" id="messageText">
                Our new website is <strong id="messageStrong">coming soon</strong>. We're building something amazing for you!
            </p>
        </div>

        <div class="social-links">
            <a href="tel:+977-970-8059777" class="call-us-btn" id="callBtn" title="Call us now">
                <i class="fas fa-phone-alt"></i>
                <span id="callBtnText">Call Us</span>
            </a>
            <a href="https://www.facebook.com/revivehubktm/" target="_blank" class="social-link facebook-link icon-only" id="facebookLink" title="Visit us on Facebook">
                <i class="fab fa-facebook-f"></i>
            </a>
            <a href="mailto:revivehub0@gmail.com" class="social-link email-link icon-only" id="emailLink" title="Email us">
                <i class="fas fa-envelope"></i>
            </a>
            <a href="https://wa.me/919355302220" target="_blank" class="whatsapp-btn" id="whatsappLink" title="Chat with us on WhatsApp">
                <i class="fab fa-whatsapp"></i>
                <span id="whatsappBtnText">Whatsapp Us</span>
            </a>
        </div>

        <div class="location-section">
            <div class="location-header">
                <i class="fas fa-map-marker-alt"></i>
                <span id="locationHeaderText">Our Location</span>
            </div>
            <div class="location-item">
                <i class="fas fa-building"></i>
                <span id="locationAddressText">Nayabasti, Kathmandu</span>
            </div>
            <div class="location-item">
                <i class="fas fa-phone"></i>
                <span>+977 970-8059777</span>
            </div>
        </div>
    </div>

    <script>
        // Generate animated background particles
        function createParticles() {
            const container = document.getElementById('backgroundAnimation');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 60 + 20;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 20 + 15;

                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = x + '%';
                particle.style.top = y + '%';
                particle.style.animationDuration = duration + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';

                container.appendChild(particle);
            }
        }

        // Animate progress percentage counter once on page load
        function animateProgressPercentage() {
            const progressText = document.getElementById('progressText');
            let currentValue = 0;
            const targetValue = 30;
            const increment = targetValue / 50;

            const interval = setInterval(() => {
                currentValue += increment;
                if (currentValue >= targetValue) {
                    currentValue = targetValue;
                    clearInterval(interval);
                }
                progressText.textContent = Math.floor(currentValue) + '%';
            }, 30);
        }

        // Popup functions
        function showPopup(popupId) {
            const popup = document.getElementById(popupId);
            if (popup) {
                popup.classList.add('show');
            }
        }

        function closePopup(popupId) {
            const popup = document.getElementById(popupId);
            if (popup) {
                popup.classList.remove('show');
            }
        }

        function initializePopups() {
            // Show Call Us popup after 8 seconds
            setTimeout(() => {
                showPopup('callPopup');
            }, 8000);

            // Show WhatsApp popup after 18 seconds (10 seconds after call popup)
            setTimeout(() => {
                showPopup('whatsappPopup');
            }, 18000);

            // Close Call Us popup after 25 seconds
            setTimeout(() => {
                closePopup('callPopup');
            }, 25000);

            // Close WhatsApp popup after 35 seconds
            setTimeout(() => {
                closePopup('whatsappPopup');
            }, 35000);

            // Repeat popups every 40 seconds cycle
            setInterval(() => {
                // Show Call Us popup
                showPopup('callPopup');
                setTimeout(() => {
                    closePopup('callPopup');
                }, 7000);

                // Show WhatsApp popup 10 seconds into the cycle
                setTimeout(() => {
                    showPopup('whatsappPopup');
                }, 10000);

                // Close WhatsApp popup after 17 seconds
                setTimeout(() => {
                    closePopup('whatsappPopup');
                }, 17000);
            }, 40000);
        }

        function initializeLanguageSwitcher() {
            const langEnBtn = document.getElementById('langEn');
            const langNeBtn = document.getElementById('langNe');

            if (!langEnBtn || !langNeBtn) {
                return;
            }

            const translations = {
                en: {
                    htmlLang: 'en',
                    statusText: '🔧 Under Development',
                    progressLabelText: 'Development Progress',
                    messageText: 'Our new website is <strong id="messageStrong">coming soon</strong>. We\'re building something amazing for you!',
                    callBtnText: 'Call Us',
                    whatsappBtnText: 'Whatsapp Us',
                    locationHeaderText: 'Our Location',
                    locationAddressText: 'Nayabasti, Kathmandu',
                    callBtnTitle: 'Call us now',
                    facebookLinkTitle: 'Visit us on Facebook',
                    emailLinkTitle: 'Email us',
                    whatsappLinkTitle: 'Chat with us on WhatsApp'
                },
                ne: {
                    htmlLang: 'ne',
                    statusText: '🔧 निर्माण कार्य हुँदैछ',
                    progressLabelText: 'विकास प्रगति',
                    messageText: 'हाम्रो नयाँ वेबसाइट <strong id="messageStrong">छिट्टै आउँदैछ</strong>। हामी तपाईंका लागि उत्कृष्ट सेवा तयार गर्दैछौं!',
                    callBtnText: 'फोन गर्नुहोस्',
                    whatsappBtnText: 'WhatsApp गर्नुहोस्',
                    locationHeaderText: 'हाम्रो ठेगाना',
                    locationAddressText: 'नयाँबस्ती, काठमाडौं',
                    callBtnTitle: 'अहिले नै फोन गर्नुहोस्',
                    facebookLinkTitle: 'हाम्रो फेसबुक हेर्नुहोस्',
                    emailLinkTitle: 'हामीलाई इमेल गर्नुहोस्',
                    whatsappLinkTitle: 'WhatsApp मा कुरा गर्नुहोस्'
                }
            };

            function setLanguage(language) {
                const selected = translations[language] || translations.en;

                document.documentElement.lang = selected.htmlLang;
                document.getElementById('statusText').textContent = selected.statusText;
                document.getElementById('progressLabelText').textContent = selected.progressLabelText;
                document.getElementById('messageText').innerHTML = selected.messageText;
                document.getElementById('callBtnText').textContent = selected.callBtnText;
                document.getElementById('whatsappBtnText').textContent = selected.whatsappBtnText;
                document.getElementById('locationHeaderText').textContent = selected.locationHeaderText;
                document.getElementById('locationAddressText').textContent = selected.locationAddressText;
                document.getElementById('callBtn').setAttribute('title', selected.callBtnTitle);
                document.getElementById('facebookLink').setAttribute('title', selected.facebookLinkTitle);
                document.getElementById('emailLink').setAttribute('title', selected.emailLinkTitle);
                document.getElementById('whatsappLink').setAttribute('title', selected.whatsappLinkTitle);

                langEnBtn.classList.toggle('active', language === 'en');
                langNeBtn.classList.toggle('active', language === 'ne');
                localStorage.setItem('revivehub-language', language);
            }

            langEnBtn.addEventListener('click', () => setLanguage('en'));
            langNeBtn.addEventListener('click', () => setLanguage('ne'));

            const storedLanguage = localStorage.getItem('revivehub-language');
            setLanguage(storedLanguage === 'ne' ? 'ne' : 'en');
        }

        initializeLanguageSwitcher();

        // Initialize on page load
        window.addEventListener('load', () => {
            createParticles();
            animateProgressPercentage();
            initializePopups();
        });

        // Create particles if document is already loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                createParticles();
                animateProgressPercentage();
                initializePopups();
            });
        } else {
            createParticles();
            animateProgressPercentage();
            initializePopups();
        }
    </script>
</body>
</html>
